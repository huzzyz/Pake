name: Sync Upstream Fork

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/tw93/Pake.git || git remote set-url upstream https://github.com/tw93/Pake.git
          git fetch origin main
          git fetch upstream main

      - name: Preserve fork-specific files
        run: |
          set -euo pipefail
          mkdir -p /tmp/fork-overrides/.github/workflows
          for file in README.md .github/workflows/pake-cli.yaml .github/workflows/sync-upstream.yml; do
            mkdir -p "/tmp/fork-overrides/$(dirname "$file")"
            cp "$file" "/tmp/fork-overrides/$file"
          done

      - name: Merge upstream and re-apply overrides
        id: sync
        run: |
          set -euo pipefail

          git checkout -B main origin/main
          before="$(git rev-parse HEAD)"

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge -X ours --no-edit upstream/main

          for file in README.md .github/workflows/pake-cli.yaml .github/workflows/sync-upstream.yml; do
            cp "/tmp/fork-overrides/$file" "$file"
          done

          git add README.md .github/workflows/pake-cli.yaml .github/workflows/sync-upstream.yml
          if ! git diff --cached --quiet; then
            git commit -m "Re-apply fork customizations after upstream sync"
          fi

          after="$(git rev-parse HEAD)"
          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push fork main
        if: steps.sync.outputs.changed == 'true'
        run: git push origin main
