name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      width:
        description: "Window width (px)"
        required: false
        default: "1200"
      height:
        description: "Window height (px)"
        required: false
        default: "780"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm)"
        required: false
        default: "deb,appimage"

permissions:
  contents: write

concurrency:
  group: pake-cli-${{ github.workflow }}-${{ inputs.name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ inputs.name }}
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: false

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Setup mold linker
        uses: rui314/setup-mold@v1

      - name: Restore CLI bundle cache
        id: cli_cache
        uses: actions/cache/restore@v4
        with:
          path: dist
          key: ${{ runner.os }}-pake-cli-dist-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'rollup.config.js', 'bin/**') }}

      - name: Build CLI
        if: steps.cli_cache.outputs.cache-hit != 'true'
        run: pnpm run cli:build

      - name: Save CLI bundle cache
        if: steps.cli_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: dist
          key: ${{ steps.cli_cache.outputs.cache-primary-key }}

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          safe_name="$(printf '%s' '${{ inputs.name }}' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$safe_name" ]; then
            echo "Unable to derive a safe release tag from '${{ inputs.name }}'" >&2
            exit 1
          fi

          echo "tag=$safe_name" >> "$GITHUB_OUTPUT"
          echo "name=${{ inputs.name }}" >> "$GITHUB_OUTPUT"

      - name: Resolve icon URL
        id: icon
        shell: bash
        run: |
          if [ -n "${{ inputs.icon }}" ]; then
            echo "icon=${{ inputs.icon }}" >> "$GITHUB_OUTPUT"
            echo "source=explicit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_url="https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png"
          lower_name="$(printf '%s' '${{ inputs.name }}' | tr '[:upper:]' '[:lower:]' | xargs)"
          hyphen_name="$(printf '%s' "$lower_name" | sed -E 's/[[:space:]]+/-/g')"

          for slug in "$lower_name" "$hyphen_name"; do
            [ -n "$slug" ] || continue
            url="${base_url}/${slug}.png"
            if curl -fsSLI --max-time 10 "$url" >/dev/null; then
              echo "icon=$url" >> "$GITHUB_OUTPUT"
              echo "source=dashboard-icons" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "icon=" >> "$GITHUB_OUTPUT"
          echo "source=auto" >> "$GITHUB_OUTPUT"

      - name: Build app
        timeout-minutes: 25
        shell: bash
        run: |
          set -euo pipefail

          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")

          if [ -n "${{ steps.icon.outputs.icon }}" ]; then
            ARGS+=("--icon" "${{ steps.icon.outputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ "${{ inputs.fullscreen }}" = "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" = "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ -n "${{ inputs.targets }}" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[*]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets

          for file in \
            "${{ inputs.name }}.deb" \
            "${{ inputs.name }}.AppImage" \
            "${{ inputs.name }}.rpm" \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/rpm/*.rpm; do
            [ -f "$file" ] || continue
            mv -f "$file" release-assets/
          done

          if ! compgen -G 'release-assets/*' > /dev/null; then
            echo "No release assets were produced." >&2
            find . -maxdepth 4 \( -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) -print
            exit 1
          fi

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: release-assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
