name: Build App With Pake CLI

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        default: "macos-latest"
        type: choice
        options:
          - "windows-latest"
          - "macos-latest"
          - "ubuntu-24.04"
      url:
        description: "Website URL"
        required: true
      name:
        description: "App name (lowercase for Linux)"
        required: true
      icon:
        description: "Icon URL, auto-fetch if empty"
        required: false
      width:
        description: "Window width (px)"
        required: false
        default: "1200"
      height:
        description: "Window height (px)"
        required: false
        default: "780"
      fullscreen:
        description: "Start in fullscreen mode"
        required: false
        type: boolean
        default: false
      hide_title_bar:
        description: "Hide title bar (macOS only)"
        required: false
        type: boolean
        default: false
      multi_arch:
        description: "Universal binary (macOS only)"
        required: false
        type: boolean
        default: false
      targets:
        description: "Package formats (comma-separated: deb,appimage,rpm)"
        required: false
        default: "deb"

permissions:
  contents: write

jobs:
  build:
    name: ${{ inputs.platform }}
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Node.js Environment
        uses: ./.github/actions/setup-env
        with:
          mode: build

      - name: Build CLI
        run: pnpm run cli:build

      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Rust cache restore
        uses: actions/cache/restore@v4.2.0
        id: cache_store
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}

      - name: Prepare release metadata
        id: release_meta
        shell: bash
        run: |
          safe_name="$(printf '%s' '${{ inputs.name }}' | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$safe_name" ]; then
            echo "Unable to derive release tag from '${{ inputs.name }}'" >&2
            exit 1
          fi

          echo "tag=$safe_name" >> "$GITHUB_OUTPUT"
          echo "name=${{ inputs.name }}" >> "$GITHUB_OUTPUT"

      - name: Resolve icon URL
        id: icon
        shell: pwsh
        run: |
          if ("${{ inputs.icon }}" -ne "") {
            "icon=${{ inputs.icon }}" >> $env:GITHUB_OUTPUT
            "source=explicit" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $name = "${{ inputs.name }}".ToLower().Trim()
          $customIcons = @{
            "solitude" = "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/synology-dsm.png"
          }

          if ($customIcons.ContainsKey($name)) {
            "icon=$($customIcons[$name])" >> $env:GITHUB_OUTPUT
            "source=custom-map" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $baseSlugs = @($name, ($name -replace '\s+', '-')) | Where-Object { $_ } | Select-Object -Unique
          $slugs = $baseSlugs

          foreach ($slug in $slugs) {
            $iconUrl = "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/$slug.png"

            try {
              $response = Invoke-WebRequest -Uri $iconUrl -Method Head -MaximumRedirection 5 -TimeoutSec 10 -ErrorAction Stop
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 400) {
                "icon=$iconUrl" >> $env:GITHUB_OUTPUT
                "source=dashboardicons" >> $env:GITHUB_OUTPUT
                exit 0
              }
            } catch {
              continue
            }
          }

          "icon=" >> $env:GITHUB_OUTPUT
          "source=auto" >> $env:GITHUB_OUTPUT

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.release_meta.outputs.tag }}" --title "${{ steps.release_meta.outputs.name }}"
          else
            gh release create "${{ steps.release_meta.outputs.tag }}" --title "${{ steps.release_meta.outputs.name }}" --notes ""
          fi

      - name: Build App (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 25
        shell: bash
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")

          if [ -n "${{ steps.icon.outputs.icon }}" ]; then
            ARGS+=("--icon" "${{ steps.icon.outputs.icon }}")
          fi

          if [ -n "${{ inputs.width }}" ]; then
            ARGS+=("--width" "${{ inputs.width }}")
          fi

          if [ -n "${{ inputs.height }}" ]; then
            ARGS+=("--height" "${{ inputs.height }}")
          fi

          if [ "${{ inputs.fullscreen }}" == "true" ]; then
            ARGS+=("--fullscreen")
          fi

          if [ "${{ inputs.hide_title_bar }}" == "true" ]; then
            ARGS+=("--hide-title-bar")
          fi

          if [ "${{ inputs.multi_arch }}" == "true" ]; then
            ARGS+=("--multi-arch")
          fi

          if [ -n "${{ inputs.targets }}" ] && [ "${{ runner.os }}" == "Linux" ]; then
            ARGS+=("--targets" "${{ inputs.targets }}")
          fi

          echo "Running: node dist/cli.js ${ARGS[@]}"
          node dist/cli.js "${ARGS[@]}"

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"

          if ("${{ steps.icon.outputs.icon }}" -ne "") {
            $args += "--icon", "${{ steps.icon.outputs.icon }}"
          }

          if ("${{ inputs.width }}" -ne "") {
            $args += "--width", "${{ inputs.width }}"
          }

          if ("${{ inputs.height }}" -ne "") {
            $args += "--height", "${{ inputs.height }}"
          }

          if ("${{ inputs.fullscreen }}" -eq "true") {
            $args += "--fullscreen"
          }

          if ("${{ inputs.hide_title_bar }}" -eq "true") {
            $args += "--hide-title-bar"
          }

          Write-Host "Running: node dist/cli.js $($args -join ' ')"
          node dist/cli.js $args

          git checkout -- src-tauri/Cargo.lock

      - name: Normalize package filenames (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          find_one() {
            local pattern=$1
            shift
            python3 -c "import sys; from pathlib import Path; pattern = sys.argv[1]; paths = []; [paths.extend(Path(base).rglob(pattern)) for base in sys.argv[2:]]; paths = [p for p in paths if p.is_file()]; paths.sort(key=lambda p: p.stat().st_mtime, reverse=True); print(paths[0]) if paths else sys.exit(1)" "$pattern" "$@"
          }

          if [ "${{ runner.os }}" = "macOS" ]; then
            src=$(find_one '*.dmg' . src-tauri/target)
            dest="${{ inputs.name }}.dmg"
            if [ "$(cd "$(dirname "$src")" && pwd)/$(basename "$src")" = "$(pwd)/$dest" ]; then
              echo "Normalized DMG already present: $dest"
            else
              cp "$src" "$dest"
              echo "Normalized DMG: $src -> $dest"
            fi
          fi

          if [ "${{ runner.os }}" = "Linux" ]; then
            if src=$(find_one '*.deb' . src-tauri/target 2>/dev/null); then
              dest="${{ inputs.name }}.deb"
              if [ "$(cd "$(dirname "$src")" && pwd)/$(basename "$src")" = "$(pwd)/$dest" ]; then
                echo "Normalized DEB already present: $dest"
              else
                cp "$src" "$dest"
                echo "Normalized DEB: $src -> $dest"
              fi
            fi
            if src=$(find_one '*.AppImage' . src-tauri/target 2>/dev/null); then
              dest="${{ inputs.name }}.AppImage"
              if [ "$(cd "$(dirname "$src")" && pwd)/$(basename "$src")" = "$(pwd)/$dest" ]; then
                echo "Normalized AppImage already present: $dest"
              else
                cp "$src" "$dest"
                echo "Normalized AppImage: $src -> $dest"
              fi
            fi
          fi

      - name: Normalize package filename (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path . -Filter *.msi -Recurse | Sort-Object LastWriteTime -Descending
          if ($files.Count -gt 0) {
            Copy-Item -LiteralPath $files[0].FullName -Destination "${{ inputs.name }}.msi" -Force
            Write-Host "Normalized MSI: $($files[0].FullName) -> ${{ inputs.name }}.msi"
          }

      - name: Upload DMG to release (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -f "${{ inputs.name }}.dmg" ]; then
            gh release upload "${{ steps.release_meta.outputs.tag }}" "${{ inputs.name }}.dmg" --clobber
          fi

      - name: Upload DEB to release (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -f "${{ inputs.name }}.deb" ]; then
            gh release upload "${{ steps.release_meta.outputs.tag }}" "${{ inputs.name }}.deb" --clobber
          fi

      - name: Upload AppImage to release (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -f "${{ inputs.name }}.AppImage" ]; then
            gh release upload "${{ steps.release_meta.outputs.tag }}" "${{ inputs.name }}.AppImage" --clobber
          fi

      - name: Upload MSI to release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path "${{ inputs.name }}.msi") {
            gh release upload "${{ steps.release_meta.outputs.tag }}" "${{ inputs.name }}.msi" --clobber
          }

      - name: Rust cache store
        uses: actions/cache/save@v4.2.0
        if: steps.cache_store.outputs.cache-hit != 'true'
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-pake-${{ hashFiles('**/Cargo.lock') }}
